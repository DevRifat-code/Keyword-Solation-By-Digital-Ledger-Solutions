<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RankPilot AI By Digital Ledger Solutions</title>
    <script>
      // Secure patch to allow re-defining fetch if third-party/sandbox scripts attempt assignment
      (function() {
        try {
          var currentFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return currentFetch;
            },
            set: function(newValue) {
              currentFetch = newValue;
            }
          });
        } catch (e) {
          console.warn("Could not patch window.fetch:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
